<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Game</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .pet-animate { animation: bounce 1s infinite; }
    @keyframes bounce {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .dark-mode { background:#1a1a2e; color:white; }
  </style>
</head>

<body id="body" class="bg-pink-100 font-sans transition-all duration-500">
<div class="max-w-2xl mx-auto mt-6 bg-white p-5 rounded-2xl shadow">

<h1 class="text-2xl font-bold text-center mb-2">🎀 Study Game 🎀</h1>

<div class="text-center text-4xl pet-animate" id="pet">🥚</div>
<div class="text-center text-sm mb-2" id="petMood"></div>

<div class="text-center text-sm">Lv <span id="level">1</span> | EXP <span id="exp">0</span>/100 | 💎 <span id="coin">0</span></div>

<button onclick="toggleDarkMode()" class="mt-2 mb-2 bg-gray-200 px-3 py-1 rounded-xl">🌙</button>

<!-- DAYS -->
<div id="days" class="flex gap-2 mb-3"></div>

<h2 class="font-bold">🎯 Nhiệm vụ hôm nay</h2>
<div id="quest" class="mb-3"></div>

<input id="taskInput" placeholder="Việc cần làm..." class="border p-2 rounded-xl w-full mb-2">
<input type="time" id="timeInput" class="border p-2 rounded-xl w-full mb-2">
<button onclick="addTask()" class="bg-pink-400 text-white p-2 rounded-xl w-full">➕</button>

<div class="w-full bg-gray-200 h-4 rounded-full my-3">
<div id="progressBar" class="h-4 bg-green-400 rounded-full" style="width:0%"></div>
</div>

<ul id="taskList"></ul>

<h2 class="mt-4 font-bold">🛒 Shop</h2>
<button onclick="buySkin('🐰',50)">🐰 (50💎)</button>
<button onclick="buySkin('🐬',80)">🐬 (80💎)</button>
<button onclick="buySkin('🦄',120)">🦄 (120💎)</button>

</div>

<script>
const days=["T2","T3","T4","T5","T6","T7","CN"];
let currentDay=days[0];

const get=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

let allTasks=get('tasks',{});
let game=get('game',{exp:0,level:1,coin:0,skin:'🥚'});
let quest=get('quest',{goal:3,done:0});

function toggleDarkMode(){document.body.classList.toggle('dark-mode');}

// DAYS
function renderDays(){
  const el=document.getElementById('days');
  el.innerHTML='';
  days.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d;
    b.className='px-2 py-1 rounded '+(d===currentDay?'bg-pink-400 text-white':'bg-gray-200');
    b.onclick=()=>{currentDay=d;renderDays();render();};
    el.appendChild(b);
  });
}

// TASK
function addTask(){
  let text=taskInput.value.trim();
  let time=timeInput.value;
  if(!text) return;

  if(!allTasks[currentDay]) allTasks[currentDay]=[];
  allTasks[currentDay].push({id:Date.now(),text,time,done:false});

  set('tasks',allTasks);
  taskInput.value='';
  timeInput.value='';
  render();
}

function toggleDone(id){
  let list=allTasks[currentDay]||[];

  list.forEach(t=>{
    if(t.id===id){
      t.done=!t.done;
      if(t.done){ gain(); quest.done++; }
      else{ game.coin=Math.max(0,game.coin-5); } // hoàn tác bị trừ nhẹ
    }
  });

  set('tasks',allTasks);
  set('quest',quest);
  set('game',game);
  render();
}

function del(id){
  let list=allTasks[currentDay]||[];
  list=list.filter(t=>{
    if(t.id===id && !t.done){
      game.coin=Math.max(0,game.coin-10); // bỏ task bị trừ mạnh
      alert('💀 Bỏ task bị trừ 10💎');
    }
    return t.id!==id;
  });
  allTasks[currentDay]=list;

  set('tasks',allTasks);
  set('game',game);
  render();
}

// GAME
function gain(){
  game.exp+=20;
  game.coin+=10;
  if(game.exp>=100){game.exp-=100;game.level++;alert('🎉 LEVEL UP');}
  set('game',game);
}

function buySkin(skin,price){
  if(game.coin<price) return alert('Không đủ 💎');
  game.coin-=price;
  game.skin=skin;
  set('game',game);
  render();
}

// PET TALK
function petTalk(percent){
  const mood=document.getElementById('petMood');
  if(percent===0) mood.textContent='😡 Lại lười nữa à??';
  else if(percent<50) mood.textContent='😤 Làm tiếp nhanh!!';
  else if(percent<100) mood.textContent='😍 Gần xong rồi!';
  else mood.textContent='👑 Đỉnh quá luôn!!';
}

// QUEST
function renderQuest(){
  if(quest.done>=quest.goal){
    game.coin+=50;
    quest={goal:Math.floor(Math.random()*3)+2,done:0};
    alert('🎁 +50💎');
    set('game',game);
    set('quest',quest);
  }
  document.getElementById('quest').textContent=`Hoàn thành ${quest.goal} task (${quest.done}/${quest.goal})`;
}

// RENDER
function render(){
  const list=document.getElementById('taskList');
  list.innerHTML='';

  const tasks=allTasks[currentDay]||[];

  let done=0;
  tasks.forEach(t=>{
    if(t.done) done++;

    let li=document.createElement('li');
    li.className='mb-1';
    li.innerHTML=`${t.done?'✅':'⬜'} ${t.text} ${t.time?`<small>(${t.time})</small>`:''}
    <button onclick="toggleDone(${t.id})">✔</button>
    <button onclick="del(${t.id})">❌</button>`;
    list.appendChild(li);
  });

  let percent=tasks.length?done/tasks.length*100:0;
  progressBar.style.width=percent+'%';

  document.getElementById('pet').textContent=game.skin;
  level.textContent=game.level;
  exp.textContent=game.exp;
  coin.textContent=game.coin;

  petTalk(percent);
  renderQuest();
}

renderDays();
render();
</script>
</body>
</html>
