<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-100 font-sans">
  <div class="max-w-2xl mx-auto mt-6 bg-white p-5 rounded-2xl shadow">

    <h1 class="text-2xl font-bold text-center mb-2">🎀 Study Planner 🎀</h1>

    <!-- PET + LEVEL -->
    <div class="text-center text-3xl mb-1" id="pet">🥚</div>
    <div class="text-center text-sm mb-2">Level <span id="level">1</span> • EXP <span id="exp">0</span>/100</div>

    <div class="text-center mb-3 text-lg">
      🔥 Streak: <span id="streak">0</span>
    </div>

    <!-- DAY -->
    <div class="flex flex-wrap gap-2 mb-4" id="days"></div>

    <!-- INPUT -->
    <div class="grid gap-2 mb-4">
      <input id="taskInput" placeholder="💡 Việc cần làm..." class="border p-2 rounded-xl">

      <div class="flex gap-2">
        <select id="subject" class="border p-2 rounded-xl flex-1">
          <option>Toán</option>
          <option>Lý</option>
          <option>Anh</option>
          <option>Văn</option>
        </select>

        <select id="priority" class="border p-2 rounded-xl flex-1">
          <option value="1">🟢 Chưa gấp</option>
          <option value="2">🟡 Trung Bình</option>
          <option value="3">🔴 GẤP</option>
        </select>
      </div>

      <input type="time" id="time" class="border p-2 rounded-xl">

      <button onclick="addTask()" class="bg-pink-400 text-white rounded-xl p-2">
        ➕ Thêm
      </button>
    </div>

    <!-- PROGRESS -->
    <div class="mb-3">
      <div class="w-full bg-gray-200 rounded-full h-4">
        <div id="progressBar" class="h-4 rounded-full bg-green-400 transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

    <ul id="taskList" class="space-y-2"></ul>

  </div>

<script>
const days = ["T2","T3","T4","T5","T6","T7","CN"];
let currentDay = days[0];

// ===== STORAGE =====
function getTasks(){ return JSON.parse(localStorage.getItem('tasks')||'{}'); }
function saveTasks(t){ localStorage.setItem('tasks',JSON.stringify(t)); }

function getGame(){
  return JSON.parse(localStorage.getItem('game')||'{"exp":0,"level":1}');
}
function saveGame(g){ localStorage.setItem('game',JSON.stringify(g)); }

// ===== DAYS =====
function renderDays(){
  const el=document.getElementById('days');
  el.innerHTML='';
  days.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d;
    b.className='px-3 py-1 rounded '+(d===currentDay?'bg-pink-400 text-white':'bg-gray-200');
    b.onclick=()=>{currentDay=d;renderDays();renderTasks();};
    el.appendChild(b);
  });
}

// ===== TASK =====
function addTask(){
  const text=taskInput.value.trim();
  if(!text) return;

  const task={
    id: Date.now(),
    text,
    subject:subject.value,
    priority:+priority.value,
    time:time.value,
    done:false
  };

  const tasks=getTasks();
  if(!tasks[currentDay]) tasks[currentDay]=[];
  tasks[currentDay].push(task);

  saveTasks(tasks);
  taskInput.value='';
  renderTasks();
}

function toggleDone(id){
  const tasks=getTasks();
  const list=tasks[currentDay]||[];

  list.forEach(t=>{
    if(t.id===id){
      t.done=!t.done;
      if(t.done) gainEXP(t.priority);
    }
  });

  tasks[currentDay]=list;
  saveTasks(tasks);
  renderTasks();
}

function deleteTask(id){
  const tasks=getTasks();
  tasks[currentDay]=(tasks[currentDay]||[]).filter(t=>t.id!==id);
  saveTasks(tasks);
  renderTasks();
}

// ===== GAME SYSTEM =====
function gainEXP(priority){
  const g=getGame();

  let add = priority==3?30:priority==2?20:10;
  g.exp += add;

  if(g.exp>=100){
    g.exp-=100;
    g.level++;
    alert('🎉 LEVEL UP!!!');
  }

  saveGame(g);
}

function renderGame(){
  const g=getGame();
  document.getElementById('exp').textContent=g.exp;
  document.getElementById('level').textContent=g.level;

  const pet=document.getElementById('pet');
  if(g.level<2) pet.textContent='🥚';
  else if(g.level<4) pet.textContent='🐣';
  else if(g.level<7) pet.textContent='🐰';
  else pet.textContent='👑🦄✨';
}

// ===== RENDER =====
function renderTasks(){
  const listEl=document.getElementById('taskList');
  listEl.innerHTML='';

  const tasks=(getTasks()[currentDay]||[]).sort((a,b)=>b.priority-a.priority);

  let done=0;

  tasks.forEach(t=>{
    if(t.done) done++;

    const li=document.createElement('li');
    li.className='p-3 rounded-xl flex justify-between items-center bg-pink-50';

    const left=document.createElement('div');
    left.innerHTML=`${t.priority==3?'🔴':t.priority==2?'🟡':'🟢'} <b>[${t.subject}]</b> ${t.text}<br><small>${t.time||''}</small>`;
    if(t.done) left.classList.add('line-through');

    const right=document.createElement('div');

    const doneBtn=document.createElement('button');
    doneBtn.textContent = t.done ? '↩' : '✔';
    doneBtn.onclick=()=>toggleDone(t.id);

    const delBtn=document.createElement('button');
    delBtn.textContent='❌';
    delBtn.onclick=()=>deleteTask(t.id);

    right.appendChild(doneBtn);
    right.appendChild(delBtn);

    li.appendChild(left);
    li.appendChild(right);
    listEl.appendChild(li);
  });

  updateStats(done,tasks.length);
  renderGame();
}

function updateStats(done,total){
  let percent= total? done/total*100 : 0;
  document.getElementById('progressBar').style.width=percent+'%';

  if(percent===100 && total>0){
    let today=new Date().toDateString();
    if(localStorage.getItem('last')!==today){
      let s=+(localStorage.getItem('streak')||0);
      localStorage.setItem('streak',s+1);
      localStorage.setItem('last',today);
    }
  }

  document.getElementById('streak').textContent=localStorage.getItem('streak')||0;
}

renderDays();
renderTasks();

</script>
</body>
</html>
