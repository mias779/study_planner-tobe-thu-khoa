<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerpuff Planner💖</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="bg-gradient-to-br from-pink-200 to-purple-200 min-h-screen font-sans">

<div class="max-w-xl mx-auto mt-6 bg-white/80 backdrop-blur p-5 rounded-3xl shadow-xl text-center">

  <h1 class="text-3xl font-bold mb-2">💖 Powerpuff Planner 💖</h1>

  <!-- INPUT -->
  <div class="grid gap-2 mb-4">
    <input id="taskInput" placeholder="🌸 Việc cần làm..." class="border p-2 rounded-xl">

    <div class="flex gap-2">
      <select id="priority" class="border p-2 rounded-xl flex-1">
        <option value="low">🟢 Dễ</option>
        <option value="medium">🟡 Trung</option>
        <option value="high">🔴 Gấp</option>
      </select>

      <input type="time" id="time" class="border p-2 rounded-xl flex-1">
    </div>

    <button onclick="addTask()" class="bg-pink-400 text-white p-2 rounded-xl">➕ Thêm</button>
  </div>

  <!-- PROGRESS -->
  <div class="mb-4">
    <div class="w-full bg-gray-200 rounded-full h-4">
      <div id="progressBar" class="h-4 bg-pink-400 rounded-full" style="width:0%"></div>
    </div>
  </div>

  <!-- TASK -->
  <ul id="taskList" class="space-y-2"></ul>

</div>

<script>
function getTasks(){return JSON.parse(localStorage.getItem('tasks')||'[]');}
function saveTasks(tasks){localStorage.setItem('tasks',JSON.stringify(tasks));}

function addTask(){
  const text=document.getElementById('taskInput').value.trim();
  const priority=document.getElementById('priority').value;
  const time=document.getElementById('time').value;

  if(!text) return;

  const tasks=getTasks();
  tasks.push({text,priority,time,done:false});
  saveTasks(tasks);

  document.getElementById('taskInput').value='';
  render();
}

function render(){
  const list=document.getElementById('taskList');
  list.innerHTML='';

  const tasks=getTasks();
  let done=0;

  tasks.forEach((task,i)=>{
    if(task.done) done++;

    const li=document.createElement('li');
    li.className='bg-white p-3 rounded-xl shadow flex justify-between items-center';

    const left=document.createElement('div');
    left.innerHTML=`🌸 ${task.text}<br><small>${task.time||''}</small>`;
    if(task.done) left.classList.add('line-through');

    // màu theo độ khẩn cấp
    if(task.priority==='high') li.style.borderLeft='5px solid red';
    if(task.priority==='medium') li.style.borderLeft='5px solid orange';
    if(task.priority==='low') li.style.borderLeft='5px solid green';

    const btns=document.createElement('div');

    const toggle=document.createElement('button');
    toggle.textContent=task.done?'↩️':'✔️';
    toggle.onclick=()=>{
      task.done=!task.done;
      tasks[i]=task;
      saveTasks(tasks);
      render();
    };

    const del=document.createElement('button');
    del.textContent='❌';
    del.onclick=()=>{
      tasks.splice(i,1);
      saveTasks(tasks);
      render();
    };

    btns.appendChild(toggle);
    btns.appendChild(del);

    li.appendChild(left);
    li.appendChild(btns);
    list.appendChild(li);

    // ⏰ NHẮC GIỜ
    if(task.time && !task.done){
      const now=new Date();
      const [h,m]=task.time.split(':');
      const target=new Date();
      target.setHours(h,m,0);

      const diff=target-now;
      if(diff>0 && diff<60000){
        alert('⏰ Đến giờ: '+task.text);
      }
    }
  });

  const percent=tasks.length?(done/tasks.length)*100:0;
  document.getElementById('progressBar').style.width=percent+'%';
}

render();
</script>

</body>
</html>
