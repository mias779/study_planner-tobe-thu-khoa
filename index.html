<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Powerpuff Planner FINAL BOSS 💖</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="min-h-screen font-sans transition-all duration-500">

<div class="max-w-xl mx-auto mt-6 bg-white/80 backdrop-blur p-5 rounded-3xl shadow-xl text-center">

  <h1 class="text-3xl font-bold mb-2">💖 FINAL BOSS PLANNER 💖</h1>
  <p class="text-sm mb-3">✨ You are THAT girl ✨</p>

  <!-- THEME -->
  <div class="flex justify-center gap-4 mb-4 text-3xl">
    <button onclick="setTheme('pink')">💗</button>
    <button onclick="setTheme('blue')">💙</button>
    <button onclick="setTheme('green')">💚</button>
  </div>

  <!-- STREAK -->
  <div class="mb-2">🔥 Streak: <span id="streak">0</span></div>

  <!-- POMODORO -->
  <div class="mb-3">⏳ <span id="timer">25:00</span>
    <button onclick="startTimer()">▶</button>
  </div>

  <!-- INPUT -->
  <div class="flex gap-2 mb-4">
    <input id="taskInput" placeholder="🌸 Việc cần làm..." class="flex-1 border p-2 rounded-xl">
    <button onclick="addTask()" class="bg-pink-400 text-white px-4 rounded-xl">➕</button>
  </div>

  <!-- PROGRESS -->
  <div class="mb-4">
    <div class="text-sm mb-1">🎮 Level</div>
    <div class="w-full bg-gray-200 rounded-full h-4">
      <div id="progressBar" class="h-4 rounded-full transition-all duration-500" style="width:0%"></div>
    </div>
  </div>

  <!-- PET -->
  <div id="pet" class="text-5xl mb-3 animate-bounce">🐣</div>

  <!-- TASK -->
  <ul id="taskList" class="space-y-2"></ul>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>
<button onclick="toggleMusic()" style="position:fixed;bottom:20px;right:20px">🎧</button>

<script>
let currentTheme='pink';
function setTheme(color){
  const body=document.getElementById('body');
  if(color==='pink') body.className='bg-gradient-to-br from-pink-200 to-purple-200 min-h-screen';
  if(color==='blue') body.className='bg-gradient-to-br from-blue-200 to-cyan-200 min-h-screen';
  if(color==='green') body.className='bg-gradient-to-br from-green-200 to-lime-200 min-h-screen';
}

function getTasks(){return JSON.parse(localStorage.getItem('tasks')||'[]');}
function saveTasks(tasks){localStorage.setItem('tasks',JSON.stringify(tasks));}

function addTask(){
  const text=taskInput.value.trim();
  if(!text) return;
  const tasks=getTasks();
  tasks.push({text,done:false});
  saveTasks(tasks);
  taskInput.value='';
  render();
}

function render(){
  const list=document.getElementById('taskList');
  list.innerHTML='';
  const tasks=getTasks();
  let done=0;

  tasks.forEach((task,i)=>{
    if(task.done) done++;
    const li=document.createElement('li');
    li.className='flex justify-between items-center bg-white p-3 rounded-2xl shadow hover:scale-105 transition';

    const span=document.createElement('span');
    span.textContent='🌸 '+task.text;
    if(task.done) span.classList.add('line-through');

    const toggle=document.createElement('button');
    toggle.textContent=task.done?'↩️':'✔️';
    toggle.onclick=()=>{
      task.done=!task.done;
      saveTasks(tasks);
      render();
      if(task.done) confetti();
    };

    const del=document.createElement('button');
    del.textContent='❌';
    del.onclick=()=>{
      tasks.splice(i,1);
      saveTasks(tasks);
      render();
    };

    li.appendChild(span);
    li.appendChild(toggle);
    li.appendChild(del);
    list.appendChild(li);
  });

  const percent=tasks.length?(done/tasks.length)*100:0;
  document.getElementById('progressBar').style.width=percent+'%';

  const pet=document.getElementById('pet');
  if(percent===100 && tasks.length>0) pet.textContent='🐥➡️🐰➡️🦄';
  else if(percent>50) pet.textContent='🐰💪';
  else pet.textContent='🐣';

  if(percent===100 && tasks.length>0){
    let s=parseInt(localStorage.getItem('streak')||0);
    localStorage.setItem('streak',s+1);
  }

  document.getElementById('streak').textContent=localStorage.getItem('streak')||0;
}

// POMODORO
let time=1500,interval;
function startTimer(){
  clearInterval(interval);
  interval=setInterval(()=>{
    if(time<=0){alert('🎉 Nghỉ thôi!');time=1500;}
    time--;
    let m=Math.floor(time/60),s=time%60;
    document.getElementById('timer').textContent=`${m}:${s<10?'0'+s:s}`;
  },1000);
}

// MUSIC
let playing=false;
function toggleMusic(){
  const m=document.getElementById('music');
  if(playing){m.pause();} else {m.play();}
  playing=!playing;
}

// CONFETTI
function confetti(){
  alert('🎉 LEVEL UP!!!');
}

setTheme('pink');
render();
</script>

</body>
</html>
